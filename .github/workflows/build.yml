name: Build PixelHeart
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ios-theos/theos:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Tweak
        run: |
          make clean
          make package
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: PixelHeart-deb
          path: packages/*.deb
