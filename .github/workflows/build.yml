name: Build Tweak
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make libxml2-dev build-essential
          git clone --recursive https://github.com/theos/theos.git ~/theos
          cd ~/theos && git clone https://github.com/theos/sdks.git sdks
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build package
        run: |
          make clean
          make package THEOS_PACKAGE_SCHEME=rootless

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: PixelHeart
          path: packages/*.deb
